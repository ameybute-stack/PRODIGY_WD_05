<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tic-Tac-Toe</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --border: #2a2a2a;
      --x-color: #e63946;
      --o-color: #4cc9f0;
      --text: #f0f0f0;
      --muted: #888;
      --win-glow-x: 0 0 20px rgba(230, 57, 70, 0.6);
      --win-glow-o: 0 0 20px rgba(76, 201, 240, 0.6);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    header {
      text-align: center;
      margin-bottom: 32px;
    }

    header h1 {
      font-family: 'Space Mono', monospace;
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      letter-spacing: 0.08em;
      color: var(--text);
    }

    header h1 span.x { color: var(--x-color); }
    header h1 span.o { color: var(--o-color); }

    /* Mode selector */
    .mode-selector {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
    }

    .mode-btn {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 8px 20px;
      border-radius: 4px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .mode-btn.active {
      border-color: var(--o-color);
      color: var(--o-color);
    }

    /* Score board */
    .scoreboard {
      display: flex;
      gap: 0;
      border: 1.5px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 24px;
      font-family: 'Space Mono', monospace;
    }

    .score-item {
      padding: 12px 28px;
      text-align: center;
      border-right: 1.5px solid var(--border);
    }

    .score-item:last-child { border-right: none; }

    .score-label {
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .score-label.x { color: var(--x-color); }
    .score-label.o { color: var(--o-color); }

    .score-value {
      font-size: 1.6rem;
      font-weight: 700;
    }

    /* Status */
    .status {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 20px;
      height: 24px;
      letter-spacing: 0.04em;
      text-align: center;
      transition: color 0.2s;
    }

    .status.x-turn { color: var(--x-color); }
    .status.o-turn { color: var(--o-color); }
    .status.win-x   { color: var(--x-color); }
    .status.win-o   { color: var(--o-color); }
    .status.draw    { color: var(--muted); }

    /* Board */
    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 28px;
    }

    .cell {
      width: clamp(90px, 22vw, 120px);
      height: clamp(90px, 22vw, 120px);
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Space Mono', monospace;
      font-size: clamp(2rem, 7vw, 3.2rem);
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, box-shadow 0.2s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #1e1e1e;
      border-color: #444;
    }

    .cell.x {
      color: var(--x-color);
      cursor: default;
    }

    .cell.o {
      color: var(--o-color);
      cursor: default;
    }

    .cell.win-cell.x {
      background: rgba(230, 57, 70, 0.08);
      border-color: var(--x-color);
      box-shadow: var(--win-glow-x);
    }

    .cell.win-cell.o {
      background: rgba(76, 201, 240, 0.08);
      border-color: var(--o-color);
      box-shadow: var(--win-glow-o);
    }

    .cell.taken { cursor: default; }

    /* Buttons */
    .controls {
      display: flex;
      gap: 12px;
    }

    .btn {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      padding: 10px 28px;
      border-radius: 4px;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--text);
      cursor: pointer;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      transition: all 0.18s;
    }

    .btn:hover {
      background: var(--surface);
      border-color: #555;
    }

    .btn.primary {
      background: var(--x-color);
      border-color: var(--x-color);
      color: #fff;
    }

    .btn.primary:hover {
      opacity: 0.85;
    }

    footer {
      margin-top: 40px;
      font-size: 0.72rem;
      color: #444;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <header>
    <h1><span class="x">X</span> · Tic-Tac-Toe · <span class="o">O</span></h1>
  </header>

  <div class="mode-selector">
    <button class="mode-btn active" id="btn2p" onclick="setMode('2p')">2 Players</button>
    <button class="mode-btn" id="btnAI" onclick="setMode('ai')">vs AI</button>
  </div>

  <div class="scoreboard">
    <div class="score-item">
      <div class="score-label x">X</div>
      <div class="score-value" id="score-x">0</div>
    </div>
    <div class="score-item">
      <div class="score-label">Draws</div>
      <div class="score-value" id="score-d">0</div>
    </div>
    <div class="score-item">
      <div class="score-label o">O</div>
      <div class="score-value" id="score-o">0</div>
    </div>
  </div>

  <div class="status x-turn" id="status">X's turn</div>

  <div class="board" id="board">
    <div class="cell" onclick="handleClick(0)"></div>
    <div class="cell" onclick="handleClick(1)"></div>
    <div class="cell" onclick="handleClick(2)"></div>
    <div class="cell" onclick="handleClick(3)"></div>
    <div class="cell" onclick="handleClick(4)"></div>
    <div class="cell" onclick="handleClick(5)"></div>
    <div class="cell" onclick="handleClick(6)"></div>
    <div class="cell" onclick="handleClick(7)"></div>
    <div class="cell" onclick="handleClick(8)"></div>
  </div>

  <div class="controls">
    <button class="btn primary" onclick="resetGame()">New Game</button>
    <button class="btn" onclick="resetScore()">Reset Score</button>
  </div>

  <footer>Built with HTML · CSS · JavaScript</footer>

  <script>
    const WINS = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let board = Array(9).fill(null);
    let current = 'X';
    let gameOver = false;
    let mode = '2p';
    let scores = { X: 0, O: 0, D: 0 };

    function setMode(m) {
      mode = m;
      document.getElementById('btn2p').classList.toggle('active', m === '2p');
      document.getElementById('btnAI').classList.toggle('active', m === 'ai');
      resetGame();
    }

    function handleClick(i) {
      if (gameOver || board[i]) return;
      if (mode === 'ai' && current === 'O') return;
      makeMove(i);
      if (mode === 'ai' && !gameOver) {
        setTimeout(aiMove, 400);
      }
    }

    function makeMove(i) {
      board[i] = current;
      const cells = document.querySelectorAll('.cell');
      cells[i].textContent = current;
      cells[i].classList.add(current.toLowerCase(), 'taken');

      const win = checkWin();
      if (win) {
        highlight(win);
        scores[current]++;
        updateScores();
        setStatus(`${current} wins! 🎉`, `win-${current.toLowerCase()}`);
        gameOver = true;
        return;
      }
      if (board.every(c => c)) {
        scores.D++;
        updateScores();
        setStatus("It's a draw!", 'draw');
        gameOver = true;
        return;
      }
      current = current === 'X' ? 'O' : 'X';
      setStatus(`${current}'s turn`, `${current.toLowerCase()}-turn`);
    }

    function aiMove() {
      const best = getBestMove();
      makeMove(best);
    }

    function getBestMove() {
      // Try to win
      for (let i = 0; i < 9; i++) {
        if (!board[i]) {
          board[i] = 'O';
          if (checkWin()) { board[i] = null; return i; }
          board[i] = null;
        }
      }
      // Block X
      for (let i = 0; i < 9; i++) {
        if (!board[i]) {
          board[i] = 'X';
          if (checkWin()) { board[i] = null; return i; }
          board[i] = null;
        }
      }
      // Center
      if (!board[4]) return 4;
      // Corners
      for (let c of [0,2,6,8]) if (!board[c]) return c;
      // Any
      return board.findIndex(c => !c);
    }

    function checkWin() {
      return WINS.find(([a,b,c]) =>
        board[a] && board[a] === board[b] && board[b] === board[c]
      ) || null;
    }

    function highlight(combo) {
      const cells = document.querySelectorAll('.cell');
      combo.forEach(i => cells[i].classList.add('win-cell'));
    }

    function setStatus(msg, cls) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = 'status ' + cls;
    }

    function updateScores() {
      document.getElementById('score-x').textContent = scores.X;
      document.getElementById('score-o').textContent = scores.O;
      document.getElementById('score-d').textContent = scores.D;
    }

    function resetGame() {
      board = Array(9).fill(null);
      current = 'X';
      gameOver = false;
      document.querySelectorAll('.cell').forEach(c => {
        c.textContent = '';
        c.className = 'cell';
      });
      setStatus("X's turn", 'x-turn');
    }

    function resetScore() {
      scores = { X: 0, O: 0, D: 0 };
      updateScores();
      resetGame();
    }
  </script>
</body>
</html>
