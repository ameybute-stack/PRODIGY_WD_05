<!DOCTYPE html>
<html lang="en">

<head>

    <!-- ==========================
         BASIC INFORMATION
    =========================== -->

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Weather Dashboard</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        /* ==========================
           GLOBAL STYLES
        =========================== */

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            min-height:100vh;
            background:linear-gradient(135deg,#1e3c72,#2a5298);
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
        }

        /* ==========================
           MAIN CONTAINER
        =========================== */

        .container{
            width:100%;
            max-width:900px;
            background:rgba(255,255,255,0.15);
            backdrop-filter:blur(15px);
            border-radius:25px;
            padding:30px;
            color:white;
            box-shadow:0 10px 30px rgba(0,0,0,0.25);
        }

        /* ==========================
           HEADER
        =========================== */

        .header{
            text-align:center;
            margin-bottom:25px;
        }

        .header h1{
            font-size:2.5rem;
        }

        .header p{
            opacity:0.9;
        }

        /* ==========================
           CLOCK
        =========================== */

        .clock{
            text-align:center;
            margin-bottom:25px;
            font-size:1rem;
        }

        /* ==========================
           SEARCH BOX
        =========================== */

        .search-box{
            display:flex;
            gap:10px;
            margin-bottom:25px;
        }

        .search-box input{
            flex:1;
            padding:12px;
            border:none;
            border-radius:10px;
            outline:none;
            font-size:16px;
        }

        .search-box button{
            padding:12px 25px;
            border:none;
            border-radius:10px;
            background:#38bdf8;
            color:white;
            font-weight:600;
            cursor:pointer;
            transition:0.3s;
        }

        .search-box button:hover{
            background:#0ea5e9;
        }

        /* ==========================
           WEATHER SECTION
        =========================== */

        .weather{
            display:none;
            text-align:center;
        }

        .city{
            font-size:2rem;
            font-weight:600;
        }

        .icon{
            font-size:80px;
            margin:10px 0;
        }

        .temperature{
            font-size:4rem;
            font-weight:700;
        }

        .condition{
            font-size:1.2rem;
            margin-bottom:20px;
        }

        /* ==========================
           WEATHER DETAILS GRID
        =========================== */

        .details{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
            gap:15px;
            margin-top:20px;
        }

        .card{
            background:rgba(255,255,255,0.15);
            padding:20px;
            border-radius:15px;
        }

        .card h3{
            margin-bottom:10px;
        }

        /* ==========================
           LOADING & ERROR
        =========================== */

        .loading{
            display:none;
            text-align:center;
            margin-top:20px;
        }

        .error{
            text-align:center;
            color:#ffd7d7;
            margin-top:15px;
        }

        /* ==========================
           FOOTER
        =========================== */

        footer{
            text-align:center;
            margin-top:30px;
            opacity:0.8;
            font-size:14px;
        }

        /* ==========================
           RESPONSIVE DESIGN
        =========================== */

        @media(max-width:768px){

            .search-box{
                flex-direction:column;
            }

            .temperature{
                font-size:3rem;
            }

            .city{
                font-size:1.5rem;
            }

        }

    </style>

</head>

<body>

<div class="container">

    <!-- ==========================
         HEADER
    =========================== -->

    <div class="header">
        <h1>🌦 Weather Dashboard</h1>
        <p>Real-Time Weather Information System</p>
    </div>

    <!-- ==========================
         DATE & TIME
    =========================== -->

    <div class="clock">
        <div id="date"></div>
        <div id="time"></div>
    </div>

    <!-- ==========================
         SEARCH SECTION
    =========================== -->

    <div class="search-box">
        <input type="text" id="city" placeholder="🔍 Enter City Name">
        <button onclick="getWeather()">Search</button>
    </div>

    <div class="loading" id="loading">
        Loading weather data...
    </div>

    <div class="error" id="error"></div>

    <!-- ==========================
         WEATHER INFORMATION
    =========================== -->

    <div class="weather" id="weather">

        <div class="city" id="cityName"></div>

        <div class="icon" id="icon"></div>

        <div class="temperature" id="temperature"></div>

        <div class="condition" id="condition"></div>

        <!-- WEATHER DETAILS -->

        <div class="details">

            <div class="card">
                <h3>🌡 Feels Like</h3>
                <p id="feels"></p>
            </div>

            <div class="card">
                <h3>💧 Humidity</h3>
                <p id="humidity"></p>
            </div>

            <div class="card">
                <h3>🌬 Wind Speed</h3>
                <p id="wind"></p>
            </div>

            <div class="card">
                <h3>📊 Pressure</h3>
                <p id="pressure"></p>
            </div>

            <div class="card">
                <h3>👀 Visibility</h3>
                <p id="visibility"></p>
            </div>

            <div class="card">
                <h3>☁ Cloud Cover</h3>
                <p id="cloud"></p>
            </div>

        </div>

    </div>

    <!-- ==========================
         FOOTER
    =========================== -->

    <footer>
        Developed by Amey Bute © 2025
    </footer>

</div>

<script>

    /* ==========================
       LIVE CLOCK
    =========================== */

    function updateClock(){

        const now = new Date();

        document.getElementById("date").innerText =
            now.toDateString();

        document.getElementById("time").innerText =
            now.toLocaleTimeString();
    }

    setInterval(updateClock,1000);
    updateClock();

    /* ==========================
       WEATHER EMOJI
    =========================== */

    function getEmoji(condition){

        condition = condition.toLowerCase();

        if(condition.includes("sun")) return "☀️";
        if(condition.includes("cloud")) return "☁️";
        if(condition.includes("rain")) return "🌧️";
        if(condition.includes("storm")) return "⛈️";
        if(condition.includes("snow")) return "❄️";
        if(condition.includes("mist")) return "🌫️";
        if(condition.includes("fog")) return "🌫️";

        return "🌤️";
    }

    /* ==========================
       FETCH WEATHER DATA
    =========================== */

    async function getWeather(){

        const city =
            document.getElementById("city").value.trim();

        if(city === ""){

            document.getElementById("error").innerText =
                "Please enter a city name.";

            return;
        }

        document.getElementById("error").innerText = "";
        document.getElementById("loading").style.display = "block";
        document.getElementById("weather").style.display = "none";

        try{

            const response =
                await fetch(`https://wttr.in/${city}?format=j1`);

            const data = await response.json();

            const current =
                data.current_condition[0];

            const condition =
                current.weatherDesc[0].value;

            document.getElementById("cityName").innerText = city;
            document.getElementById("icon").innerText = getEmoji(condition);
            document.getElementById("temperature").innerText = current.temp_C + "°C";
            document.getElementById("condition").innerText = condition;

            document.getElementById("feels").innerText =
                current.FeelsLikeC + "°C";

            document.getElementById("humidity").innerText =
                current.humidity + "%";

            document.getElementById("wind").innerText =
                current.windspeedKmph + " km/h";

            document.getElementById("pressure").innerText =
                current.pressure + " mb";

            document.getElementById("visibility").innerText =
                current.visibility + " km";

            document.getElementById("cloud").innerText =
                current.cloudcover + "%";

            document.getElementById("weather").style.display = "block";

        }
        catch(error){

            document.getElementById("error").innerText =
                "Unable to fetch weather data.";

        }

        document.getElementById("loading").style.display = "none";
    }

    /* ==========================
       ENTER KEY SEARCH
    =========================== */

    document.getElementById("city")
    .addEventListener("keypress", function(event){

        if(event.key === "Enter"){
            getWeather();
        }

    });

    /* ==========================
       DEFAULT CITY
    =========================== */

    window.onload = function(){

        document.getElementById("city").value = "Mumbai";
        getWeather();

    };

</script>

</body>
</html>
